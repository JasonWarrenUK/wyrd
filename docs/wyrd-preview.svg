<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 720 428" width="720" height="428">
  <defs>
    <style>
      text {
        font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Menlo', 'Monaco', 'Consolas', monospace;
        font-size: 13.5px;
      }
    </style>
  </defs>

  <!-- Background -->
  <rect width="720" height="428" fill="#1c1917" rx="6"/>

  <!--
    Use SVG rectangles for the box border so alignment is pixel-perfect
    and independent of font metrics.

    Box: x=14, y=14, width=692, height=382
    Divider line (horizontal, above capture bar): y=390
    Vertical column divider between panes: x=364 (approx col 44 of 76)

    Content left pane:  x=22 .. x=362
    Content right pane: x=372 .. x=698

    Line height: 18px; first content baseline: y=50
  -->

  <!-- Outer box -->
  <rect x="14" y="14" width="692" height="382" fill="none" stroke="#57534e" stroke-width="1"/>
  <!-- Horizontal rule above capture bar -->
  <line x1="14" y1="390" x2="706" y2="390" stroke="#57534e" stroke-width="1"/>
  <!-- Bottom line (closes box below capture bar) -->
  <rect x="14" y="390" width="692" height="24" fill="none" stroke="#57534e" stroke-width="1"/>

  <!--
    Text rows. Left pane content starts x=22, right pane x=380.
    Rows at y = 50, 68, 86, 104, 122, 140, 158, 176, 194, 212, 230, 248,
                266, 284, 302, 320, 338, 356, 374
    Line height = 18px
  -->

  <!-- ── ROW 1: 08:00 schedule ── -->
  <text x="22"  y="50" fill="#78716c">08:00</text>
  <text x="74"  y="50" fill="#d97706">▓▓▓▓▓▓▓▓</text>
  <text x="150" y="50" fill="#e7e5e4">Docs update</text>
  <text x="380" y="50" fill="#78716c"># Client Project</text>

  <!-- ── ROW 2: 09:30 ── -->
  <text x="22"  y="68" fill="#78716c">09:30</text>
  <text x="74"  y="68" fill="#d97706">████████</text>
  <text x="150" y="68" fill="#e7e5e4">Rhea sprint</text>

  <!-- ── ROW 3: 10:00 ── -->
  <text x="22"  y="86" fill="#78716c">10:00</text>
  <text x="74"  y="86" fill="#78716c">┄┄┄┄┄┄┄┄</text>
  <text x="150" y="86" fill="#e7e5e4">Stand-up</text>
  <text x="380" y="86" fill="#78716c">Body content here...</text>

  <!-- ── ROW 4: 10:45 ── -->
  <text x="22"  y="104" fill="#78716c">10:45</text>
  <text x="74"  y="104" fill="#d97706">▓▓▓▓▓▓</text>
  <text x="150" y="104" fill="#e7e5e4">TWCB deep work</text>

  <!-- ── ROW 5: 11:45 ── -->
  <text x="22"  y="122" fill="#78716c">11:45</text>
  <text x="74"  y="122" fill="#78716c">░░</text>
  <text x="150" y="122" fill="#e7e5e4">Triage</text>
  <text x="380" y="122" fill="#e7e5e4">status</text>
  <text x="435" y="122" fill="#d97706">in_progress</text>

  <!-- ── ROW 6: energy ── -->
  <text x="380" y="140" fill="#e7e5e4">energy</text>
  <text x="435" y="140" fill="#92400e">▓▓</text>
  <text x="452" y="140" fill="#d97706">deep</text>

  <!-- ── ROW 7: ◆ unscheduled | due ── -->
  <text x="22"  y="158" fill="#d97706">◆</text>
  <text x="35"  y="158" fill="#e7e5e4">47m unscheduled · 1 task displaced</text>
  <text x="380" y="158" fill="#e7e5e4">due</text>
  <text x="435" y="158" fill="#78716c">2026-04-01</text>

  <!-- ── ROW 8: empty ── -->

  <!-- ── ROW 9: EDGES ── -->
  <text x="380" y="194" fill="#92400e">||==&gt;&gt; EDGES</text>

  <!-- ── ROW 10: ← blocks ── -->
  <text x="380" y="212" fill="#dc2626">←</text>
  <text x="392" y="212" fill="#e7e5e4">blocks:</text>
  <text x="449" y="212" fill="#78716c">Portfolio draft</text>

  <!-- ── ROW 11: ⊘ waiting ── -->
  <text x="380" y="230" fill="#78716c">⊘ waiting: Dan · 12d</text>

  <!-- ── ROW 12: empty ── -->

  <!-- ── ROW 13: BUDGETS ── -->
  <text x="380" y="266" fill="#92400e">||==&gt;&gt; BUDGETS</text>

  <!-- ── ROW 14: ● EPA ── -->
  <text x="380" y="284" fill="#65a30d">●</text>
  <text x="392" y="284" fill="#e7e5e4">EPA</text>
  <text x="449" y="284" fill="#65a30d">9.5/12h</text>

  <!-- ── ROW 15: ◐ Records ── -->
  <text x="380" y="302" fill="#d97706">◐</text>
  <text x="392" y="302" fill="#e7e5e4">Records</text>
  <text x="449" y="302" fill="#d97706">£42/£50</text>

  <!-- ── ROW 16: ○ Baby ── -->
  <text x="380" y="320" fill="#dc2626">○</text>
  <text x="392" y="320" fill="#e7e5e4">Baby</text>
  <text x="449" y="320" fill="#dc2626">£580/£500</text>

  <!-- ── CAPTURE BAR ── -->
  <text x="22"  y="408" fill="#78716c">[capture bar]</text>
  <text x="380" y="408" fill="#d97706">◆ 47m on Project (45m)</text>
</svg>
