<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 684 432" width="684" height="432">
  <rect width="684" height="432" fill="#1c1917" rx="6"/>
  <style>
    text {
      font-family: 'JetBrains Mono', 'Fira Code', 'Cascadia Code', 'Menlo', 'Monaco', 'Consolas', monospace;
      font-size: 13px;
    }
    .dim  { fill: #57534e; }
    .mute { fill: #78716c; }
    .fg   { fill: #e7e5e4; }
    .amb  { fill: #d97706; }
    .damb { fill: #92400e; }
    .red  { fill: #dc2626; }
    .grn  { fill: #65a30d; }
  </style>

  <!--
    char width = 7.8px at 13px monospace
    x(col) = 18 + col * 7.8   (col 0 = opening │)

    Original layout (col numbers):
      0:  │
      1-3: spaces
      4-8: 08:00
      9:  space
      10-17: ▓▓▓▓▓▓▓▓
      18: space
      19-29: Docs update
      45: right-pane content start
      76: closing │

    Key x values:
      col  0 → x= 18.0  (│)
      col  4 → x= 49.2  (timestamp)
      col 10 → x= 96.0  (energy bar)
      col 19 → x=166.2  (task body)
      col 45 → x=369.0  (right pane)
      col 76 → x=610.8  (closing │)

    Rounding to nearest 0.5:
      col  0 → x=18
      col  4 → x=49
      col 10 → x=96
      col 19 → x=166
      col 45 → x=369
      col 76 → x=611
  -->

  <!-- Row 1: top border -->
  <text x="18" y="36"><tspan class="dim">┌──────────────────────────────────────────────────────────────────────────┐</tspan></text>

  <!-- Row 2: empty -->
  <text y="54">
    <tspan x="18"  class="dim">│</tspan>
    <tspan x="611" class="dim">│</tspan>
  </text>

  <!-- Row 3: 08:00 Docs update | # Client Project -->
  <text y="72">
    <tspan x="18"  class="dim">│</tspan>
    <tspan x="49"  class="mute">08:00</tspan>
    <tspan x="96"  class="amb">▓▓▓▓▓▓▓▓</tspan>
    <tspan x="166" class="fg">Docs update</tspan>
    <tspan x="369" class="mute"># Client Project</tspan>
    <tspan x="611" class="dim">│</tspan>
  </text>

  <!-- Row 4: 09:30 Rhea sprint -->
  <text y="90">
    <tspan x="18"  class="dim">│</tspan>
    <tspan x="49"  class="mute">09:30</tspan>
    <tspan x="96"  class="amb">████████</tspan>
    <tspan x="166" class="fg">Rhea sprint</tspan>
    <tspan x="611" class="dim">│</tspan>
  </text>

  <!-- Row 5: 10:00 Stand-up | Body content here... -->
  <text y="108">
    <tspan x="18"  class="dim">│</tspan>
    <tspan x="49"  class="mute">10:00</tspan>
    <tspan x="96"  class="mute">┄┄┄┄┄┄┄┄</tspan>
    <tspan x="166" class="fg">Stand-up</tspan>
    <tspan x="369" class="mute">Body content here...</tspan>
    <tspan x="611" class="dim">│</tspan>
  </text>

  <!-- Row 6: 10:45 TWCB deep work -->
  <text y="126">
    <tspan x="18"  class="dim">│</tspan>
    <tspan x="49"  class="mute">10:45</tspan>
    <tspan x="96"  class="amb">▓▓▓▓▓▓</tspan>
    <tspan x="166" class="fg">TWCB deep work</tspan>
    <tspan x="611" class="dim">│</tspan>
  </text>

  <!-- Row 7: 11:45 Triage | status  in_progress -->
  <text y="144">
    <tspan x="18"  class="dim">│</tspan>
    <tspan x="49"  class="mute">11:45</tspan>
    <tspan x="96"  class="mute">░░</tspan>
    <tspan x="166" class="fg">Triage</tspan>
    <tspan x="369" class="fg">status</tspan>
    <tspan x="416" class="amb">in_progress</tspan>
    <tspan x="611" class="dim">│</tspan>
  </text>

  <!-- Row 8: (empty left) | energy  ▓▓ deep -->
  <text y="162">
    <tspan x="18"  class="dim">│</tspan>
    <tspan x="369" class="fg">energy</tspan>
    <tspan x="416" class="damb">▓▓</tspan>
    <tspan x="432" class="amb">deep</tspan>
    <tspan x="611" class="dim">│</tspan>
  </text>

  <!-- Row 9: ◆ 47m unscheduled… | due  2026-04-01 -->
  <text y="180">
    <tspan x="18"  class="dim">│</tspan>
    <tspan x="34"  class="amb">◆</tspan>
    <tspan x="42"  class="fg">47m unscheduled · 1 task displaced</tspan>
    <tspan x="369" class="fg">due</tspan>
    <tspan x="416" class="mute">2026-04-01</tspan>
    <tspan x="611" class="dim">│</tspan>
  </text>

  <!-- Row 10: empty -->
  <text y="198">
    <tspan x="18"  class="dim">│</tspan>
    <tspan x="611" class="dim">│</tspan>
  </text>

  <!-- Row 11: EDGES header -->
  <text y="216">
    <tspan x="18"  class="dim">│</tspan>
    <tspan x="369" class="damb">||==&gt;&gt; EDGES</tspan>
    <tspan x="611" class="dim">│</tspan>
  </text>

  <!-- Row 12: ← blocks: Portfolio draft -->
  <text y="234">
    <tspan x="18"  class="dim">│</tspan>
    <tspan x="369" class="red">←</tspan>
    <tspan x="377" class="fg">blocks:</tspan>
    <tspan x="432" class="mute">Portfolio draft</tspan>
    <tspan x="611" class="dim">│</tspan>
  </text>

  <!-- Row 13: ⊘ waiting: Dan · 12d -->
  <text y="252">
    <tspan x="18"  class="dim">│</tspan>
    <tspan x="369" class="mute">⊘ waiting: Dan · 12d</tspan>
    <tspan x="611" class="dim">│</tspan>
  </text>

  <!-- Row 14: empty -->
  <text y="270">
    <tspan x="18"  class="dim">│</tspan>
    <tspan x="611" class="dim">│</tspan>
  </text>

  <!-- Row 15: BUDGETS header -->
  <text y="288">
    <tspan x="18"  class="dim">│</tspan>
    <tspan x="369" class="damb">||==&gt;&gt; BUDGETS</tspan>
    <tspan x="611" class="dim">│</tspan>
  </text>

  <!-- Row 16: ● EPA  9.5/12h -->
  <text y="306">
    <tspan x="18"  class="dim">│</tspan>
    <tspan x="369" class="grn">●</tspan>
    <tspan x="377" class="fg">EPA</tspan>
    <tspan x="416" class="grn">9.5/12h</tspan>
    <tspan x="611" class="dim">│</tspan>
  </text>

  <!-- Row 17: ◐ Records  £42/£50 -->
  <text y="324">
    <tspan x="18"  class="dim">│</tspan>
    <tspan x="369" class="amb">◐</tspan>
    <tspan x="377" class="fg">Records</tspan>
    <tspan x="416" class="amb">£42/£50</tspan>
    <tspan x="611" class="dim">│</tspan>
  </text>

  <!-- Row 18: ○ Baby  £580/£500 -->
  <text y="342">
    <tspan x="18"  class="dim">│</tspan>
    <tspan x="369" class="red">○</tspan>
    <tspan x="377" class="fg">Baby</tspan>
    <tspan x="416" class="red">£580/£500</tspan>
    <tspan x="611" class="dim">│</tspan>
  </text>

  <!-- Row 19: empty -->
  <text y="360">
    <tspan x="18"  class="dim">│</tspan>
    <tspan x="611" class="dim">│</tspan>
  </text>

  <!-- Row 20: divider -->
  <text x="18" y="378"><tspan class="dim">├──────────────────────────────────────────────────────────────────────────┤</tspan></text>

  <!-- Row 21: capture bar -->
  <text y="396">
    <tspan x="18"  class="dim">│</tspan>
    <tspan x="26"  class="mute">[capture bar]</tspan>
    <tspan x="369" class="amb">◆ 47m on Project (45m)</tspan>
    <tspan x="611" class="dim">│</tspan>
  </text>

  <!-- Row 22: bottom border -->
  <text x="18" y="414"><tspan class="dim">└──────────────────────────────────────────────────────────────────────────┘</tspan></text>
</svg>
